<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Break Dashboard</title>

<style>

/* ===== FULLSCREEN ===== */
body {
    margin:0;
    padding:20px;
    font-family:sans-serif;
    min-height:100vh;
}

/* ===== LAYOUT ===== */
.main {
    display:flex;
    gap:20px;
    height:calc(100vh - 100px);
}

.left-panel {
    width:300px;
    font-size:16px;
}

.right-panel { flex:1; }

.wrapper {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

/* ===== BOX ===== */
.box {
    flex:1;
    min-width:450px;
    padding:15px;
    border-radius:12px;
    background:#f5f5f5;
}

/* ===== CLOCK ===== */
#clockBox {
    font-size:56px;
    text-align:center;
    margin-bottom:10px;
}

/* ===== FORM ===== */
select, button {
    width:100%;
    padding:10px;
    font-size:16px;
    margin-top:5px;
}

button:disabled {
    opacity:0.4;
    cursor:not-allowed;
}

#status {
    margin-top:10px;
    font-weight:bold;
}

/* ===== ROW ===== */
.row {
    display:flex;
    justify-content:space-between;
    padding:6px;
    margin:4px 0;
    background:#fff;
    border-radius:6px;
}

</style>
</head>

<body>

<div id="clockBox">🕒</div>

<div class="main">

<!-- LEFT -->
<div class="left-panel">

<h3>☕ ลงเวลา</h3>

<select id="positionSelect" onchange="updateNames(); validateForm();">
<option value="">ตำแหน่ง</option>
<option>Head</option>
<option>QC-SA</option>
<option>QC-SV</option>
<option>QC-PR</option>
<option>QC-AI</option>
<option>QC-MKT</option>
<option>QC-Support</option>
<option>AD-BO</option>
<option>AD-STM</option>
</select>

<select id="nameSelect" onchange="validateForm()">
<option value="">ชื่อ</option>
</select>

<button id="startBtn" onclick="startBreak()" disabled>พัก ☕</button>
<button id="endBtn" onclick="endBreak()" disabled>กลับ 💻</button>

<div id="status">กรุณาเลือกข้อมูล</div>

</div>

<!-- RIGHT -->
<div class="right-panel">
<div class="wrapper">

<div class="box">
<h3>⏳ กำลังพัก</h3>
<div id="breakBox"></div>
</div>

<div class="box">
<h3>🧮 เวลาสะสม</h3>
<div id="totalBox"></div>
</div>

</div>
</div>

</div>

<script>

/* ===== DATA เต็ม ===== */
const data = {
"Head":["จ่าบอส","สปอย","มด ตานอย","ป็อป","เบส","โจโจ้","บอย ท่าพระจันทร์","อร","มอน"],
"QC-SA":["นิด","แนท","แม็ก2","ปู","หนิง","เอ","ใจ๋","ป็อบ","เฟน","เกมส์","ดาว","มะลิ","ปลา","มิน","แอ๊ว","มุ้ย"],
"QC-SV":["มาร์ค","คนใหม่ หรือคนเก่า","บอย","โปเต้","เบียร์","ยุ้ย","แบ็ค","เจน"],
"QC-PR":["ฟ้า","พราว","สุ","ลีโอ","มุก","อุ้ย","แอน","แม็ก"],
"QC-AI":["ผ่อง","หนุ่ย","โก๊ะ","อ้อม"],
"QC-MKT":["มด","มอส","เต้ย ก้างปลา 400","ตุ๊กกี้"],
"QC-Support":["เบล","อุ้ม"],
"AD-BO":["ปั้นแป้ง","บอสน้อย","ไอซ์ซี่","กัปตัน","เจนจ้า","ฟ้าครึ้ม","แฟร้ง","บังโด่ง","ฝน","พิมพ์","เจี๊ยบ","ทิพย์ซอ","อุ้ยอ้าย","สนุ๊ก","จารใหม่","นิ"],
"AD-STM":["ต่อ","แตงกวา","เอฟ","ไอซ์2","แอมมี่","เมย์","ต้อ","แหลม","เก๋","ส้ม","ตั๊ก","เฟิร์น"]
};

let status = {};
let total = {};

/* ===== CLOCK ===== */
function clock(){
    const n=new Date();
    const hh=String(n.getHours()).padStart(2,'0');
    const mm=String(n.getMinutes()).padStart(2,'0');
    const ss=String(n.getSeconds()).padStart(2,'0');

    document.getElementById("clockBox").innerHTML =
    `🕒 ${hh}:${mm}:${ss}`;
}
setInterval(clock,1000);
clock();

/* ===== VALIDATE ===== */
function validateForm(){
    let pos = document.getElementById("positionSelect").value;
    let name = document.getElementById("nameSelect").value;

    let enable = pos && name;

    document.getElementById("startBtn").disabled = !enable;
    document.getElementById("endBtn").disabled = !enable;

    document.getElementById("status").innerText =
        enable ? "พร้อมใช้งาน" : "กรุณาเลือกตำแหน่ง + ชื่อ";
}

/* ===== UPDATE NAME ===== */
function updateNames(){
    let p=document.getElementById("positionSelect").value;
    let s=document.getElementById("nameSelect");

    s.innerHTML="<option value=''>ชื่อ</option>";

    (data[p]||[]).forEach(n=>{
        let o=document.createElement("option");
        o.text=n;
        o.value=n;
        s.appendChild(o);
    });
}

/* ===== START ===== */
function startBreak(){
    let n=document.getElementById("nameSelect").value;
    if(!n) return;
    status[n]=Date.now();
}

/* ===== END ===== */
function endBreak(){
    let n=document.getElementById("nameSelect").value;
    if(!n) return;

    if(status[n]){
        let sec=(Date.now()-status[n])/1000;
        total[n]=(total[n]||0)+sec;
        delete status[n];
    }
}

/* ===== FORMAT ===== */
function f(ms){
    let s=Math.floor(ms/1000);
    let m=String(Math.floor(s/60)).padStart(2,'0');
    let r=String(s%60).padStart(2,'0');
    return `${m}:${r}`;
}

/* ===== POSITION ===== */
function pos(n){
    for(let p in data){
        if(data[p].includes(n)) return p;
    }
    return "-";
}

/* ===== RENDER ===== */
function render(){
    let b=document.getElementById("breakBox");
    b.innerHTML="";
    Object.keys(status).forEach(n=>{
        b.innerHTML+= `
        <div class="row">
            <span>${pos(n)}</span>
            <span>${n}</span>
            <span>${f(Date.now()-status[n])}</span>
        </div>`;
    });
}

function renderTotal(){
    let b=document.getElementById("totalBox");
    b.innerHTML="";
    Object.keys(total).forEach(n=>{
        b.innerHTML+= `
        <div class="row">
            <span>${pos(n)}</span>
            <span>${n}</span>
            <span>${f(total[n]*1000)}</span>
        </div>`;
    });
}

setInterval(()=>{
    render();
    renderTotal();
},1000);

</script>

</body>
</html>
