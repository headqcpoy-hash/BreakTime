<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Break Dashboard</title>

<style>

/* 🎨 THEME */
:root {
    --bg: #ffffff;
    --text: #000;
    --box: #ffffff;
    --border: #ccc;
    --card: #ffe6a7;
}

body.dark {
    --bg: #121212;
    --text: #ffffff;
    --box: #1e1e1e;
    --border: #444;
    --card: #333;
}

body {
    font-family: sans-serif;
    margin: 0;
    padding: 15px;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

/* 🕒 TOP */
#topBar {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 10px;
}

#clockBox {
    font-size: 44px;
    font-weight: bold;
    padding: 12px 25px;
    border: 3px solid var(--border);
    border-radius: 12px;
}

/* 🌗 BTN */
#themeBtn {
    position: absolute;
    right: 10px;
    top: 10px;
    width: 28px;
    height: 28px;
    font-size: 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
}

body:not(.dark) #themeBtn {
    background: #fff;
    color: #000;
}

body.dark #themeBtn {
    background: #000;
    color: #fff;
}

/* layout */
.main {
    display: flex;
    gap: 15px;
}

/* left */
.left-panel {
    width: 230px;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    background: var(--box);
}

/* right */
.right-panel {
    flex: 1;
}

.wrapper {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.box {
    flex: 1;
    min-width: 320px;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    background: var(--box);
}

/* CARD ROW */
.card.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;

    background: var(--card);
    margin: 6px;
    padding: 8px;
    border-radius: 8px;
}

/* columns */
.col {
    flex: 1;
    font-size: 13px;
}

.col.pos {
    font-weight: bold;
    color: #4a90e2;
}

.col.name {
    font-weight: bold;
}

.col.time {
    text-align: right;
    font-family: monospace;
}

/* input */
select, button {
    width: 100%;
    font-size: 14px;
    padding: 5px;
    margin-top: 5px;
}

#status {
    font-size: 14px;
    color: #4a90e2;
    margin-top: 10px;
}

</style>
</head>

<body>

<div id="topBar">
    <div id="clockBox">🕒 00:00:00</div>
    <button id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>

<div class="main">

<div class="left-panel">

    <h4>☕ Control</h4>

    <select id="positionSelect" onchange="updateNames()">
        <option value="">ตำแหน่ง</option>
        <option value="Head">Head</option>
        <option value="QC-SA">QC-SA</option>
        <option value="QC-SV">QC-SV</option>
        <option value="QC-PR">QC-PR</option>
        <option value="QC-AI">QC-AI</option>
        <option value="QC-MKT">QC-MKT</option>
        <option value="QC-Support">QC-Support</option>
        <option value="AD-BO">AD-BO</option>
        <option value="AD-STM">AD-STM</option>
    </select>

    <select id="nameSelect">
        <option value="">ชื่อ</option>
    </select>

    <button onclick="startBreak()">พัก ☕</button>
    <button onclick="endBreak()">กลับ 💻</button>

    <div id="status">สถานะ: -</div>

</div>

<div class="right-panel">

<div class="wrapper">

    <div class="box">
        <h3>⏳ กำลังพัก</h3>
        <div id="breakBox"></div>
    </div>

    <div class="box">
        <h3>🧮 เวลาสะสม</h3>
        <div id="totalBox"></div>
    </div>

</div>

</div>

</div>

<script>

/* DATA */
const data = {
"Head": ["จ่าบอส","สปอย","มด ตานอย","ป็อป","เบส","โจโจ้","บอย ท่าพระจันทร์","อร","มอน"],
"QC-SA": ["นิด","แนท","แม็ก2","ปู","หนิง","เอ","ใจ๋","ป็อบ","เฟน","เกมส์","ดาว","มะลิ","ปลา","มิน","แอ๊ว","มุ้ย"],
"QC-SV": ["มาร์ค","คนใหม่ หรือคนเก่า","บอย","โปเต้","เบียร์","ยุ้ย","แบ็ค","เจน"],
"QC-PR": ["ฟ้า","พราว","สุ","ลีโอ","มุก","อุ้ย","แอน","แม็ก"],
"QC-AI": ["ผ่อง","หนุ่ย","โก๊ะ","อ้อม"],
"QC-MKT": ["มด","มอส","เต้ย ก้างปลา 400","ตุ๊กกี้"],
"QC-Support": ["เบล","อุ้ม"],
"AD-BO": ["ปั้นแป้ง","บอสน้อย","ไอซ์ซี่ 789","กัปตัน","เจนจ้า","ฟ้าครึ้ม","แฟร้ง","บังโด่ง 786","ฝน","พิมพ์","เจี๊ยบ","ทิพย์ซอ","อุ้ยอ้าย","สนุ๊ก","จารใหม่ 168","นิ"],
"AD-STM": ["ต่อ","แตงกวา","เอฟ","ไอซ์2","แอมมี่","เมย์","ต้อ","แหลม","เก๋","ส้ม","ตั๊ก","เฟิร์น"]
};

let status = {};
let totalBreak = {};

/* THEME */
function toggleTheme() {
    document.body.classList.toggle("dark");

    const btn = document.getElementById("themeBtn");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme","dark");
        btn.innerText = "☀️";
    } else {
        localStorage.setItem("theme","light");
        btn.innerText = "🌙";
    }
}

(function loadTheme(){
    if (localStorage.getItem("theme")==="dark"){
        document.body.classList.add("dark");
        document.getElementById("themeBtn").innerText="☀️";
    }
})();

/* CLOCK */
function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');

    document.getElementById("clockBox").innerText =
        `🕒 ${h}:${m}:${s}`;
}
setInterval(updateClock,1000);
updateClock();

/* NAME */
function updateNames() {
    const pos = document.getElementById("positionSelect").value;
    const select = document.getElementById("nameSelect");

    select.innerHTML = '<option value="">ชื่อ</option>';

    if (!data[pos]) return;

    data[pos].forEach(name=>{
        let opt=document.createElement("option");
        opt.value=name;
        opt.textContent=name;
        select.appendChild(opt);
    });
}

/* BREAK */
function startBreak() {
    const name=document.getElementById("nameSelect").value;
    if(!name) return alert("เลือกชื่อ");

    status[name]=Date.now();
    document.getElementById("status").innerText=name+" เริ่มพัก";
}

function endBreak() {
    const name=document.getElementById("nameSelect").value;
    if(!name) return alert("เลือกชื่อ");

    if(status[name]){
        const sec=Math.floor((Date.now()-status[name])/1000);
        totalBreak[name]=(totalBreak[name]||0)+sec;
        delete status[name];
    }

    document.getElementById("status").innerText=name+" กลับแล้ว";
    renderTotal();
}

/* FORMAT */
function format(ms){
    const s=Math.floor(ms/1000);
    const m=String(Math.floor(s/60)).padStart(2,'0');
    const r=String(s%60).padStart(2,'0');
    return `${m}:${r}`;
}

function findPos(name){
    for(const p in data){
        if(data[p].includes(name)) return p;
    }
    return "-";
}

/* LIVE BREAK */
function render(){
    const box=document.getElementById("breakBox");
    box.innerHTML="";

    Object.keys(status).forEach(name=>{
        box.innerHTML+=`
        <div class="card row">
            <div class="col pos">${findPos(name)}</div>
            <div class="col name">${name}</div>
            <div class="col time">⏳ ${format(Date.now()-status[name])}</div>
        </div>`;
    });
}

/* TOTAL */
function renderTotal(){
    const box=document.getElementById("totalBox");
    box.innerHTML="";

    Object.keys(totalBreak).forEach(name=>{
        box.innerHTML+=`
        <div class="card row">
            <div class="col pos">${findPos(name)}</div>
            <div class="col name">${name}</div>
            <div class="col time">🧮 ${format(totalBreak[name]*1000)}</div>
        </div>`;
    });
}

setInterval(()=>{
    render();
    renderTotal();
},1000);

</script>

</body>
</html>
