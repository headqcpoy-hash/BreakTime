<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Break Dashboard</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:sans-serif;
    background:#0b001f;
    color:white;
}

#clockBox{
    font-size:50px;
    text-align:center;
    margin-bottom:20px;
}

.main{display:flex;gap:20px;}

.box{
    flex:1;
    padding:15px;
    border:1px solid #6a00ff;
    border-radius:10px;
    background:#12002e;
}

.row,.header{
    display:flex;
    padding:8px;
}

.header{font-weight:bold;border-bottom:1px solid #6a00ff;}

.row div,.header div{flex:1;}

select,button{
    width:100%;
    padding:10px;
    margin-top:5px;
}
</style>
</head>

<body>

<div id="clockBox">🕒</div>

<div class="main">

<div class="box">
<h3>CONTROL</h3>

<select id="name">
<option value="">ชื่อ</option>
<option>จ่าบอส</option>
<option>สปอย</option>
<option>มด</option>
</select>

<select id="type">
<option value="">ประเภท</option>
<option>พักกินข้าว</option>
<option>เข้าห้องน้ำ</option>
<option>สูบบุหรี่</option>
</select>

<button onclick="start()">START</button>
<button onclick="end()">END</button>

<div id="status"></div>
</div>

<div class="box">
<h3>ACTIVE</h3>
<div id="activeBox"></div>
</div>

</div>

<script>

/* 🔥 ใส่ URL ที่ได้จาก Deploy ตรงนี้ */
const API_URL = "https://script.google.com/macros/s/PASTE_YOUR_URL_HERE/exec";

let active={};

setInterval(()=>{
    const n=new Date();
    clockBox.innerText=n.toLocaleTimeString();
},1000);

function send(data){
    fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(data)
    })
    .then(r=>r.text())
    .then(t=>status.innerText="OK")
    .catch(e=>status.innerText="ERROR");
}

function start(){
    let name=name.value;
    let type=type.value;
    if(!name||!type) return;

    active[name]=Date.now();

    send({
        name,
        type,
        position:"-",
        action:"START",
        duration:0
    });
}

function end(){
    let name=name.value;
    if(!active[name]) return;

    let sec=(Date.now()-active[name])/1000;

    send({
        name,
        type,
        position:"-",
        action:"END",
        duration:sec
    });

    delete active[name];
}

</script>

</body>
</html>
