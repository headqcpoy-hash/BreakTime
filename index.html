<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Break Dashboard</title>

<style>
body { font-family: sans-serif; padding: 20px; text-align:center; }

select, button {
    font-size: 18px;
    padding: 6px;
    margin: 5px;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.box {
    width: 60%;
    border: 2px solid #ccc;
    border-radius: 10px;
    padding: 10px;
    margin: auto;
}

.card {
    background: #ffe6a7;
    margin: 8px;
    padding: 10px;
    border-radius: 8px;
}

.time {
    font-size: 14px;
    color: #555;
}

#status {
    font-size: 20px;
    color: blue;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>☕ Break Dashboard (แยกตำแหน่ง)</h1>

<!-- 🔥 ตำแหน่ง -->
<select id="positionSelect" onchange="updateNames()">
    <option value="">เลือกตำแหน่ง</option>
    <option value="Head">Head</option>
    <option value="QC-SA">QC-SA</option>
    <option value="QC-SV">QC-SV</option>
    <option value="QC-PR">QC-PR</option>
    <option value="QC-AI">QC-AI</option>
    <option value="QC-MKT">QC-MKT</option>
    <option value="QC-Support">QC-Support</option>
    <option value="AD-BO">AD-BO</option>
    <option value="AD-STM">AD-STM</option>
</select>

<!-- 🔥 ชื่อ -->
<select id="nameSelect">
    <option value="">เลือกชื่อ</option>
</select>

<br>

<button onclick="startBreak()">พักเบรค</button>
<button onclick="endBreak()">กลับมา</button>

<div id="status">สถานะ: -</div>

<hr>

<div class="box">
    <h2>⏳ คนที่กำลังพัก (Real-time)</h2>
    <div id="breakBox"></div>
</div>

<script>

/* 🔥 DATA แยกตามตำแหน่ง */
const data = {

"Head": ["จ่าบอส","สปอย","มด ตานอย","ป็อป","เบส","โจโจ้","บอย ท่าพระจันทร์","อร","มอน"],

"QC-SA": ["นิด","แนท","แม็ก2","ปู","หนิง","เอ","ใจ๋","ป็อบ","เฟน","เกมส์","ดาว","มะลิ","ปลา","มิน","แอ๊ว","มุ้ย"],

"QC-SV": ["มาร์ค","คนใหม่ หรือคนเก่า","บอย","โปเต้","เบียร์","ยุ้ย","แบ็ค","เจน"],

"QC-PR": ["ฟ้า","พราว","สุ","ลีโอ","มุก","อุ้ย","แอน","แม็ก"],

"QC-AI": ["ผ่อง","หนุ่ย","โก๊ะ","อ้อม"],

"QC-MKT": ["มด","มอส","เต้ย ก้างปลา 400","ตุ๊กกี้"],

"QC-Support": ["เบล","อุ้ม"],

"AD-BO": ["ปั้นแป้ง","บอสน้อย","ไอซ์ซี่ 789","กัปตัน","เจนจ้า","ฟ้าครึ้ม","แฟร้ง","บังโด่ง 786","ฝน","พิมพ์","เจี๊ยบ","ทิพย์ซอ","อุ้ยอ้าย","สนุ๊ก","จารใหม่ 168","นิ"],

"AD-STM": ["ต่อ","แตงกวา","เอฟ","ไอซ์2","แอมมี่","เมย์","ต้อ","แหลม","เก๋","ส้ม","ตั๊ก","เฟิร์น"]
};

/* 🔥 status + เวลา */
let status = {}; // name -> start time

/* 🔥 เปลี่ยนชื่อ */
function updateNames() {
    const pos = document.getElementById("positionSelect").value;
    const select = document.getElementById("nameSelect");

    select.innerHTML = '<option value="">เลือกชื่อ</option>';

    if (!data[pos]) return;

    data[pos].forEach(name => {
        let opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
    });
}

/* 🔥 เริ่มพัก */
function startBreak() {
    const name = document.getElementById("nameSelect").value;
    if (!name) return alert("เลือกชื่อ");

    status[name] = Date.now();

    document.getElementById("status").innerText =
        name + " เริ่มพัก ☕";

    render();
}

/* 🔥 จบพัก */
function endBreak() {
    const name = document.getElementById("nameSelect").value;
    if (!name) return alert("เลือกชื่อ");

    delete status[name];

    document.getElementById("status").innerText =
        name + " กลับมาทำงาน 💻";

    render();
}

/* 🔥 คำนวณเวลา */
function getMin(start) {
    return Math.floor((Date.now() - start) / 60000);
}

/* 🔥 render เฉพาะคนที่พัก */
function render() {
    const box = document.getElementById("breakBox");
    box.innerHTML = "";

    Object.keys(status).forEach(name => {
        const min = getMin(status[name]);

        box.innerHTML += `
            <div class="card">
                <b>${name}</b><br>
                ⏳ กำลังพักอยู่<br>
                <span class="time">${min} นาที</span>
            </div>
        `;
    });
}

/* 🔥 auto refresh */
setInterval(render, 3000);

</script>

</body>
</html>
