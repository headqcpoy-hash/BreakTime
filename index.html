<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dashboard QC / AD</title>

<style>
body { font-family: sans-serif; padding: 20px; text-align:center; }

select, button {
    font-size: 18px;
    padding: 6px;
    margin: 5px;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.box {
    width: 45%;
    border: 2px solid #ccc;
    border-radius: 10px;
    padding: 10px;
}

.card {
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
}

.work { background: #c8f7c5; }
.break { background: #ffe6a7; }

#status { font-size: 20px; margin-top: 10px; color: blue; }
</style>
</head>

<body>

<h1>📊 QC / AD Dashboard</h1>

<!-- 🔥 ตำแหน่ง -->
<select id="positionSelect" onchange="updateNames()">
    <option value="">เลือกตำแหน่ง</option>
    <option value="Head">Head</option>
    <option value="QC-SA">QC-SA</option>
    <option value="QC-SV">QC-SV</option>
    <option value="QC-PR">QC-PR</option>
    <option value="QC-AI">QC-AI</option>
    <option value="QC-MKT">QC-MKT</option>
    <option value="QC-Support">QC-Support</option>
    <option value="AD-BO">AD-BO</option>
    <option value="AD-STM">AD-STM</option>
</select>

<!-- 🔥 ชื่อ -->
<select id="nameSelect">
    <option value="">เลือกชื่อพนักงาน</option>
</select>

<br>

<button onclick="setBreak()">พักเบรค</button>
<button onclick="setWork()">กลับมา</button>

<div id="status">สถานะ: -</div>

<hr>

<div class="container">
    <div class="box">
        <h2>QC</h2>
        <div id="qcBox"></div>
    </div>

    <div class="box">
        <h2>AD</h2>
        <div id="adBox"></div>
    </div>
</div>

<script>

/* 🔥 DATA ตามที่คุณกำหนด */
const data = {

Head: ["จ่าบอส","สปอย","มด ตานอย","ป็อป","เบส","โจโจ้","บอย ท่าพระจันทร์","อร","มอน"],

"QC-SA": ["นิด","แนท","แม็ก2","ปู","หนิง","เอ","ใจ๋","ป็อบ","เฟน","เกมส์","ดาว","มะลิ","ปลา","มิน","แอ๊ว","มุ้ย"],

"QC-SV": ["มาร์ค","คนใหม่ หรือคนเก่า","บอย","โปเต้","เบียร์","ยุ้ย","แบ็ค","เจน"],

"QC-PR": ["ฟ้า","พราว","สุ","ลีโอ","มุก","อุ้ย","แอน","แม็ก"],

"QC-AI": ["ผ่อง","หนุ่ย","โก๊ะ","อ้อม"],

"QC-MKT": ["มด","มอส","เต้ย ก้างปลา 400","ตุ๊กกี้"],

"QC-Support": ["เบล","อุ้ม"],

"AD-BO": ["ปั้นแป้ง","บอสน้อย","ไอซ์ซี่ 789","กัปตัน","เจนจ้า","ฟ้าครึ้ม","แฟร้ง","บังโด่ง 786","ฝน","พิมพ์","เจี๊ยบ","ทิพย์ซอ","อุ้ยอ้าย","สนุ๊ก","จารใหม่ 168","นิ"],

"AD-STM": ["ต่อ","แตงกวา","เอฟ","ไอซ์2","แอมมี่","เมย์","ต้อ","แหลม","เก๋","ส้ม","ตั๊ก","เฟิร์น"]
};

let status = {};

/* 🔥 เปลี่ยนชื่ออัตโนมัติ */
function updateNames() {
    const pos = document.getElementById("positionSelect").value;
    const select = document.getElementById("nameSelect");

    select.innerHTML = '<option value="">เลือกชื่อพนักงาน</option>';

    if (!data[pos]) return;

    data[pos].forEach(name => {
        let opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
    });
}

/* 🔥 พัก */
function setBreak() {
    const name = document.getElementById("nameSelect").value;
    if (!name) return alert("เลือกชื่อ");

    status[name] = "break";
    document.getElementById("status").innerText = name + " พักเบรค ☕";
    render();
}

/* 🔥 ทำงาน */
function setWork() {
    const name = document.getElementById("nameSelect").value;
    if (!name) return alert("เลือกชื่อ");

    status[name] = "work";
    document.getElementById("status").innerText = name + " กลับมาทำงาน 💻";
    render();
}

/* 🔥 render dashboard */
function render() {
    document.getElementById("qcBox").innerHTML =
        data["QC-SA"].concat(data["QC-SV"], data["QC-PR"], data["QC-AI"], data["QC-MKT"], data["QC-Support"], data["Head"])
        .map(n => card(n)).join("");

    document.getElementById("adBox").innerHTML =
        data["AD-BO"].concat(data["AD-STM"])
        .map(n => card(n)).join("");
}

/* 🔥 card */
function card(name) {
    let state = status[name] || "work";
    let cls = state === "break" ? "card break" : "card work";
    let txt = state === "break" ? "☕ พัก" : "💻 ทำงาน";

    return `<div class="${cls}">
        ${name} - ${txt}
    </div>`;
}

render();

</script>

</body>
</html>
