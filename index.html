<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Break Dashboard</title>

<style>
:root {
    --bg:
        radial-gradient(circle at 20% 20%, rgba(140,0,255,0.25), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(0,180,255,0.25), transparent 40%),
        linear-gradient(135deg, #070014 0%, #0b0033 40%, #050018 100%);

    --text:#e8e6ff;
    --box: linear-gradient(145deg, rgba(30,0,60,0.8), rgba(10,0,30,0.9));
    --card: linear-gradient(145deg, rgba(120,0,255,0.15), rgba(0,180,255,0.10));
    --border: rgba(160,80,255,0.5);
}

body {
    margin:0;
    padding:20px;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
}

#clockBox {
    font-size:56px;
    text-align:center;
    margin-bottom:10px;
    text-shadow:0 0 10px #8a2be2, 0 0 20px #00c3ff;
}

.main { display:flex; gap:20px; height:calc(100vh - 100px); }
.left-panel { width:300px; }
.right-panel { flex:1; }

.wrapper { display:flex; gap:20px; }

.box {
    flex:1;
    min-width:450px;
    padding:15px;
    border-radius:14px;
    background:var(--box);
    border:1px solid var(--border);
}

.header, .row {
    display:flex;
    padding:8px;
}

.header { font-weight:bold; border-bottom:1px solid var(--border); }
.header div, .row div { flex:1; }

.row {
    margin:5px 0;
    border-radius:10px;
    background:var(--card);
}

select, button {
    width:100%;
    padding:10px;
    margin-top:5px;
    background:rgba(0,0,0,0.3);
    color:white;
    border:1px solid var(--border);
}

button:disabled { opacity:0.3; }

#status { margin-top:10px; }
</style>
</head>

<body>

<div id="clockBox">🕒</div>

<div class="main">

<div class="left-panel">

<h3>☕ CONTROL</h3>

<select id="positionSelect" onchange="updateNames(); validateForm();">
<option value="">ตำแหน่ง</option>
<option>Head</option>
<option>QC-SA</option>
<option>QC-SV</option>
<option>QC-PR</option>
<option>QC-AI</option>
<option>QC-MKT</option>
<option>QC-Support</option>
<option>AD-BO</option>
<option>AD-STM</option>
</select>

<select id="nameSelect" onchange="validateForm()">
<option value="">ชื่อ</option>
</select>

<!-- ✅ เพิ่มใหม่ -->
<select id="typeSelect" onchange="validateForm()">
<option value="">ประเภทธุระ</option>
<option>พักกินข้าว</option>
<option>เข้าห้องน้ำ</option>
<option>สูบบุหรี่</option>
<option>เอาของ(ส่วนรวม)</option>
</select>

<button id="startBtn" onclick="startBreak()" disabled>START</button>
<button id="endBtn" onclick="endBreak()" disabled>END</button>

<div id="status">SYSTEM READY</div>

</div>

<div class="right-panel">
<div class="wrapper">

<div class="box">
<h3>⏳ ACTIVE BREAK</h3>
<div class="header">
<div>POSITION</div>
<div>NAME</div>
<div>TYPE</div>
<div>TIME</div>
</div>
<div id="breakBox"></div>
</div>

<div class="box">
<h3>🧮 TOTAL TIME</h3>
<div class="header">
<div>POSITION</div>
<div>NAME</div>
<div>TIME</div>
</div>
<div id="totalBox"></div>
</div>

</div>
</div>

</div>

<script>

const data = {
"Head":["จ่าบอส","สปอย","มด ตานอย","ป็อป","เบส","โจโจ้","บอย ท่าพระจันทร์","อร","มอน"],
"QC-SA":["นิด","แนท","แม็ก2","ปู","หนิง","เอ","ใจ๋","ป็อบ","เฟน","เกมส์","ดาว","มะลิ","ปลา","มิน","แอ๊ว","มุ้ย"],
"QC-SV":["มาร์ค","คนใหม่ หรือคนเก่า","บอย","โปเต้","เบียร์","ยุ้ย","แบ็ค","เจน"],
"QC-PR":["ฟ้า","พราว","สุ","ลีโอ","มุก","อุ้ย","แอน","แม็ก"],
"QC-AI":["ผ่อง","หนุ่ย","โก๊ะ","อ้อม"],
"QC-MKT":["มด","มอส","เต้ย ก้างปลา 400","ตุ๊กกี้"],
"QC-Support":["เบล","อุ้ม"],
"AD-BO":["ปั้นแป้ง","บอสน้อย","ไอซ์ซี่","กัปตัน","เจนจ้า","ฟ้าครึ้ม","แฟร้ง","บังโด่ง","ฝน","พิมพ์","เจี๊ยบ","ทิพย์ซอ","อุ้ยอ้าย","สนุ๊ก","จารใหม่","นิ"],
"AD-STM":["ต่อ","แตงกวา","เอฟ","ไอซ์2","แอมมี่","เมย์","ต้อ","แหลม","เก๋","ส้ม","ตั๊ก","เฟิร์น"]
};

let status = {};   // start time
let total = {};    // total time

/* type เก็บคู่ key = name+type */
let active = {};

/* CLOCK */
setInterval(()=>{
    const n=new Date();
    clockBox.innerText =
    `🕒 ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
},1000);

/* VALIDATE */
function validateForm(){
    let ok = positionSelect.value && nameSelect.value && typeSelect.value;
    startBtn.disabled = !ok;
    endBtn.disabled = !ok;
    status.innerText = ok ? "READY" : "SELECT DATA";
}

/* NAME */
function updateNames(){
    nameSelect.innerHTML="<option value=''>ชื่อ</option>";
    (data[positionSelect.value]||[]).forEach(n=>{
        let o=document.createElement("option");
        o.value=n;
        o.text=n;
        nameSelect.appendChild(o);
    });
}

/* KEY */
function key(){
    return `${nameSelect.value}||${typeSelect.value}`;
}

/* START */
function startBreak(){
    let k = key();
    if(!k) return;
    active[k] = {
        name:nameSelect.value,
        type:typeSelect.value,
        pos:positionSelect.value,
        start:Date.now()
    };
}

/* END */
function endBreak(){
    let k = key();
    if(!active[k]) return;

    let sec = (Date.now()-active[k].start)/1000;

    total[k] = (total[k]||0)+sec;
    delete active[k];
}

/* FORMAT */
function f(ms){
    let s=Math.floor(ms/1000);
    let m=Math.floor(s/60);
    let r=s%60;
    return `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`;
}

/* RENDER ACTIVE */
function render(){
    breakBox.innerHTML="";
    Object.keys(active).forEach(k=>{
        let a=active[k];
        breakBox.innerHTML+=`
        <div class="row">
            <div>${a.pos}</div>
            <div>${a.name}</div>
            <div>${a.type}</div>
            <div>${f(Date.now()-a.start)}</div>
        </div>`;
    });
}

/* TOTAL */
function renderTotal(){
    totalBox.innerHTML="";
    Object.keys(total).forEach(k=>{
        let a = active[k] || {name:k.split("||")[0], pos:"-"};
        totalBox.innerHTML+=`
        <div class="row">
            <div>${a.pos}</div>
            <div>${a.name}</div>
            <div>${f(total[k]*1000)}</div>
        </div>`;
    });
}

setInterval(()=>{
    render();
    renderTotal();
},1000);

</script>

</body>
</html>
