<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Break Dashboard</title>

<style>

/* =========================
   🌟 LIGHT MODE (REAL GOLD DEPTH)
========================= */
:root {
    --bg:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.8), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255,215,120,0.3), transparent 40%),
        linear-gradient(135deg, #fff8dc 0%, #f5d27a 50%, #e0b84f 100%);

    --text:#3b2f00;

    --box: linear-gradient(145deg, #ffffff, #f3e2b0);
    --card: linear-gradient(145deg, #fff8d6, #ffd86b);

    --border:#d4af37;
}

/* =========================
   🌑 DARK MODE (DEPTH REAL)
========================= */
body.dark {
    --bg:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.05), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.03), transparent 40%),
        linear-gradient(135deg, #000000 0%, #0a0a0a 40%, #1a1a1a 100%);

    --text:#ffffff;

    --box: linear-gradient(145deg, #0a0a0a, #1a1a1a);
    --card: linear-gradient(145deg, #121212, #1f1f1f);

    --border:#2a2a2a;
}

/* =========================
   BASE
========================= */
body {
    margin:0;
    padding:15px;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* =========================
   TOP BAR
========================= */
#topBar {
    position:relative;
    display:flex;
    justify-content:center;
    margin-bottom:10px;
}

#clockBox {
    font-size:40px;
    font-weight:bold;
    padding:10px 20px;
    border-radius:14px;
    text-align:center;

    background:linear-gradient(145deg,#ffffff,#ffe9a3);
    border:2px solid #d4af37;

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.6),
        0 6px 20px rgba(212,175,55,0.3);
}

body.dark #clockBox {
    background:linear-gradient(145deg,#0a0a0a,#1a1a1a);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 8px 25px rgba(0,0,0,0.9);
}

/* =========================
   THEME BTN
========================= */
#themeBtn {
    position:absolute;
    right:10px;
    top:10px;
    width:30px;
    height:30px;
    border-radius:6px;
    border:1px solid var(--border);
    cursor:pointer;
}

/* =========================
   LAYOUT
========================= */
.main { display:flex; gap:15px; }

.left-panel {
    width:230px;
}

.right-panel { flex:1; }

.wrapper { display:flex; gap:15px; flex-wrap:wrap; }

/* =========================
   BOX (REAL DEPTH)
========================= */
.box, .left-panel {
    padding:10px;
    border-radius:14px;
    background:var(--box);
    border:1px solid var(--border);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.4),
        inset 0 -2px 4px rgba(0,0,0,0.2),
        0 8px 25px rgba(0,0,0,0.2);

    transition:0.25s;
}

body.dark .box,
body.dark .left-panel {
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -3px 6px rgba(0,0,0,0.8),
        0 10px 30px rgba(0,0,0,0.9);
}

.box:hover {
    transform:translateY(-3px);
}

/* =========================
   HEADER
========================= */
.table-header {
    display:flex;
    font-weight:bold;
    font-size:12px;
    padding:6px 8px;
    margin-bottom:6px;

    border-bottom:2px solid transparent;

    background:
        linear-gradient(var(--box), var(--box)) padding-box,
        linear-gradient(90deg, #d4af37, #fff2a6, #d4af37) border-box;
}

.table-header div { flex:1; }
.table-header div:last-child { text-align:right; }

/* =========================
   CARD
========================= */
.card.row {
    display:flex;
    padding:8px;
    margin:5px;
    border-radius:10px;
    background:var(--card);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.3),
        0 4px 10px rgba(0,0,0,0.15);

    transition:0.2s;
}

body.dark .card.row {
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 6px 18px rgba(0,0,0,0.8);
}

.card.row:hover {
    transform:translateY(-2px);
}

/* =========================
   TEXT
========================= */
.col { flex:1; font-size:13px; }

.col.pos {
    font-weight:bold;
    color:#b8860b;
}

body.dark .col.pos {
    color:#f5d06f;
}

.col.name { font-weight:bold; }

.col.time {
    text-align:right;
    font-family:monospace;
}

/* =========================
   FORM
========================= */
select, button {
    width:100%;
    margin-top:5px;
    padding:5px;
    font-size:14px;
}

#status {
    margin-top:10px;
    color:#b8860b;
}

</style>
</head>

<body>

<div id="topBar">
    <div id="clockBox">🕒</div>
    <button id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>

<div class="main">

<div class="left-panel">
<h4>☕ ลงเวลา</h4>

<select id="positionSelect" onchange="updateNames()">
<option value="">ตำแหน่ง</option>
<option>Head</option>
<option>QC-SA</option>
<option>QC-SV</option>
<option>QC-PR</option>
<option>QC-AI</option>
<option>QC-MKT</option>
<option>QC-Support</option>
<option>AD-BO</option>
<option>AD-STM</option>
</select>

<select id="nameSelect">
<option>ชื่อ</option>
</select>

<button onclick="startBreak()">พัก ☕</button>
<button onclick="endBreak()">กลับ 💻</button>

<div id="status">-</div>
</div>

<div class="right-panel">
<div class="wrapper">

<div class="box">
<h3>⏳ กำลังพัก</h3>
<div class="table-header">
<div>ตำแหน่ง</div>
<div>ชื่อ</div>
<div>ระยะเวลา</div>
</div>
<div id="breakBox"></div>
</div>

<div class="box">
<h3>🧮 เวลาสะสม</h3>
<div class="table-header">
<div>ตำแหน่ง</div>
<div>ชื่อ</div>
<div>ระยะเวลา</div>
</div>
<div id="totalBox"></div>
</div>

</div>
</div>
</div>

<script>

/* DATA */
const data = {
"Head":["จ่าบอส","สปอย","มด ตานอย","ป็อป","เบส","โจโจ้","บอย ท่าพระจันทร์","อร","มอน"],
"QC-SA":["นิด","แนท","แม็ก2","ปู","หนิง","เอ","ใจ๋","ป็อบ","เฟน","เกมส์","ดาว","มะลิ","ปลา","มิน","แอ๊ว","มุ้ย"],
"QC-SV":["มาร์ค","คนใหม่ หรือคนเก่า","บอย","โปเต้","เบียร์","ยุ้ย","แบ็ค","เจน"],
"QC-PR":["ฟ้า","พราว","สุ","ลีโอ","มุก","อุ้ย","แอน","แม็ก"],
"QC-AI":["ผ่อง","หนุ่ย","โก๊ะ","อ้อม"],
"QC-MKT":["มด","มอส","เต้ย ก้างปลา 400","ตุ๊กกี้"],
"QC-Support":["เบล","อุ้ม"],
"AD-BO":["ปั้นแป้ง","บอสน้อย","ไอซ์ซี่","กัปตัน","เจนจ้า","ฟ้าครึ้ม","แฟร้ง","บังโด่ง","ฝน","พิมพ์","เจี๊ยบ","ทิพย์ซอ","อุ้ยอ้าย","สนุ๊ก","จารใหม่","นิ"],
"AD-STM":["ต่อ","แตงกวา","เอฟ","ไอซ์2","แอมมี่","เมย์","ต้อ","แหลม","เก๋","ส้ม","ตั๊ก","เฟิร์น"]
};

let status = {};
let total = {};

function clock(){
    const n=new Date();
    const d=String(n.getDate()).padStart(2,'0');
    const m=String(n.getMonth()+1).padStart(2,'0');
    const y=n.getFullYear();
    const hh=String(n.getHours()).padStart(2,'0');
    const mm=String(n.getMinutes()).padStart(2,'0');
    const ss=String(n.getSeconds()).padStart(2,'0');
    const day=["อา","จ","อ","พ","พฤ","ศ","ส"];

    document.getElementById("clockBox").innerHTML =
    `🕒 ${hh}:${mm}:${ss}<br>📅 ${d}/${m}/${y} (${day[n.getDay()]})`;
}
setInterval(clock,1000);
clock();

function toggleTheme(){
    document.body.classList.toggle("dark");
}

function updateNames(){
    let p=document.getElementById("positionSelect").value;
    let s=document.getElementById("nameSelect");
    s.innerHTML="<option>ชื่อ</option>";
    (data[p]||[]).forEach(n=>{
        let o=document.createElement("option");
        o.text=n;
        o.value=n;
        s.appendChild(o);
    });
}

function startBreak(){
    let n=document.getElementById("nameSelect").value;
    if(!n) return alert("เลือกชื่อ");
    status[n]=Date.now();
}

function endBreak(){
    let n=document.getElementById("nameSelect").value;
    if(!n) return;
    if(status[n]){
        let sec=(Date.now()-status[n])/1000;
        total[n]=(total[n]||0)+sec;
        delete status[n];
    }
}

function f(ms){
    let s=Math.floor(ms/1000);
    let m=String(Math.floor(s/60)).padStart(2,'0');
    let r=String(s%60).padStart(2,'0');
    return `${m}:${r}`;
}

function pos(n){
    for(let p in data){
        if(data[p].includes(n)) return p;
    }
    return "-";
}

function render(){
    let b=document.getElementById("breakBox");
    b.innerHTML="";
    Object.keys(status).forEach(n=>{
        b.innerHTML+=`
        <div class="card row">
            <div class="col pos">${pos(n)}</div>
            <div class="col name">${n}</div>
            <div class="col time">${f(Date.now()-status[n])}</div>
        </div>`;
    });
}

function renderTotal(){
    let b=document.getElementById("totalBox");
    b.innerHTML="";
    Object.keys(total).forEach(n=>{
        b.innerHTML+=`
        <div class="card row">
            <div class="col pos">${pos(n)}</div>
            <div class="col name">${n}</div>
            <div class="col time">${f(total[n]*1000)}</div>
        </div>`;
    });
}

setInterval(()=>{
    render();
    renderTotal();
},1000);

</script>

</body>
</html>
