<script>

/* =========================
   🔗 GOOGLE SHEET API
========================= */
const API = "https://script.google.com/a/macros/log-horizon2.com/s/AKfycbwo2zebK-NqsoQ0fpiYIPyJQBOJ4rP8BtdES6XzQ8SJoxuQJdh9WsPDC6IdRf2nX7x_5Q/exec";

/* =========================
   👥 DATA (UI เดิมคุณ)
========================= */
const data = {
"Head":["จ่าบอส","สปอย","มด ตานอย","ป็อป","เบส","โจโจ้","บอย ท่าพระจันทร์","อร","มอน"],
"QC-SA":["นิด","แนท","แม็ก2","ปู","หนิง","เอ","ใจ๋","ป็อบ","เฟน","เกมส์","ดาว","มะลิ","ปลา","มิน","แอ๊ว","มุ้ย"],
"QC-SV":["มาร์ค","คนใหม่ หรือคนเก่า","บอย","โปเต้","เบียร์","ยุ้ย","แบ็ค","เจน"],
"QC-PR":["ฟ้า","พราว","สุ","ลีโอ","มุก","อุ้ย","แอน","แม็ก"],
"QC-AI":["ผ่อง","หนุ่ย","โก๊ะ","อ้อม"],
"QC-MKT":["มด","มอส","เต้ย ก้างปลา 400","ตุ๊กกี้"],
"QC-Support":["เบล","อุ้ม"],
"AD-BO":["ปั้นแป้ง","บอสน้อย","ไอซ์ซี่","กัปตัน","เจนจ้า","ฟ้าครึ้ม","แฟร้ง","บังโด่ง","ฝน","พิมพ์","เจี๊ยบ","ทิพย์ซอ","อุ้ยอ้าย","สนุ๊ก","จารใหม่","นิ"],
"AD-STM":["ต่อ","แตงกวา","เอฟ","ไอซ์2","แอมมี่","เมย์","ต้อ","แหลม","เก๋","ส้ม","ตั๊ก","เฟิร์น"]
};

/* =========================
   ☁️ REALTIME DATA
========================= */
let sheetData = [];

/* =========================
   🕒 CLOCK
========================= */
function clock(){
    const el=document.getElementById("clockBox");
    if(!el) return;

    const n=new Date();
    const d=String(n.getDate()).padStart(2,'0');
    const m=String(n.getMonth()+1).padStart(2,'0');
    const y=n.getFullYear();
    const hh=String(n.getHours()).padStart(2,'0');
    const mm=String(n.getMinutes()).padStart(2,'0');
    const ss=String(n.getSeconds()).padStart(2,'0');
    const day=["อา","จ","อ","พ","พฤ","ศ","ส"];

    el.innerHTML =
    `🕒 ${hh}:${mm}:${ss}<br>📅 ${d}/${m}/${y} (${day[n.getDay()]})`;
}
setInterval(clock,1000);
clock();

/* =========================
   🌙 THEME
========================= */
function toggleTheme(){
    document.body.classList.toggle("dark");
}

/* =========================
   👤 NAME SELECT
========================= */
function updateNames(){
    const p=document.getElementById("positionSelect");
    const s=document.getElementById("nameSelect");
    if(!p || !s) return;

    s.innerHTML="<option>ชื่อ</option>";

    (data[p.value]||[]).forEach(n=>{
        let o=document.createElement("option");
        o.text=n;
        o.value=n;
        s.appendChild(o);
    });
}

/* =========================
   ☕ START BREAK
========================= */
function startBreak(){
    let n=document.getElementById("nameSelect")?.value;
    let p=document.getElementById("positionSelect")?.value;

    if(!n || !p) return alert("เลือกชื่อ/ตำแหน่ง");

    fetch(API,{
        method:"POST",
        body:JSON.stringify({
            type:"start",
            name:n,
            position:p
        })
    }).catch(()=>{});

    status[n]=Date.now();
}

/* =========================
   💻 END BREAK
========================= */
function endBreak(){
    let n=document.getElementById("nameSelect")?.value;
    if(!n) return;

    fetch(API,{
        method:"POST",
        body:JSON.stringify({
            type:"end",
            name:n
        })
    }).catch(()=>{});

    if(status[n]){
        let sec=(Date.now()-status[n])/1000;
        total[n]=(total[n]||0)+sec;
        delete status[n];
    }
}

/* =========================
   ☁️ LOAD SHEET (REALTIME)
========================= */
async function loadData(){
    try{
        const res = await fetch(API);
        const txt = await res.text();
        sheetData = JSON.parse(txt);
        if(!Array.isArray(sheetData)) sheetData=[];
    }catch(e){
        sheetData=[];
    }
}
setInterval(loadData,3000);
loadData();

/* =========================
   🧠 POSITION FINDER
========================= */
function pos(n){
    for(let p in data){
        if(data[p].includes(n)) return p;
    }
    return "-";
}

/* =========================
   ⏳ BREAK RENDER
========================= */
function render(){
    const b=document.getElementById("breakBox");
    if(!b) return;

    b.innerHTML="";

    sheetData.forEach(r=>{
        if(!r[2] || r[3]) return;

        b.innerHTML+=`
        <div class="card row">
            <div class="col pos">${r[1]||"-"}</div>
            <div class="col name">${r[0]||"-"}</div>
            <div class="col time">กำลังพัก</div>
        </div>`;
    });
}

/* =========================
   🧮 TOTAL DASHBOARD
========================= */
function renderTotal(){
    const b=document.getElementById("totalBox");
    if(!b) return;

    let map={};

    sheetData.forEach(r=>{
        if(r[2] && r[3]){
            let sec=(new Date(r[3])-new Date(r[2]))/1000;
            map[r[0]]=(map[r[0]]||0)+sec;
        }
    });

    b.innerHTML="";

    Object.keys(map).forEach(n=>{
        let m=Math.floor(map[n]/60);
        let s=Math.floor(map[n]%60);

        b.innerHTML+=`
        <div class="card row">
            <div class="col pos">${pos(n)}</div>
            <div class="col name">${n}</div>
            <div class="col time">${m}:${String(s).padStart(2,'0')}</div>
        </div>`;
    });
}

/* =========================
   🔁 LOOP REALTIME
========================= */
setInterval(()=>{
    render();
    renderTotal();
},1000);

</script>
