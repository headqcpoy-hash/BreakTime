<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Break Dashboard</title>

<style>

/* =========================
   🌟 THEME (GOLD / DARK DEPTH)
========================= */
:root {
    --bg:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.8), transparent 40%),
        linear-gradient(135deg, #fff8dc 0%, #f5d27a 50%, #e0b84f 100%);

    --text:#3b2f00;
    --box: linear-gradient(145deg, #ffffff, #f3e2b0);
    --card: linear-gradient(145deg, #fff8d6, #ffd86b);
    --border:#d4af37;
}

body.dark {
    --bg:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.05), transparent 40%),
        linear-gradient(135deg, #000000 0%, #0a0a0a 40%, #1a1a1a 100%);

    --text:#ffffff;
    --box: linear-gradient(145deg, #0a0a0a, #1a1a1a);
    --card: linear-gradient(145deg, #121212, #1f1f1f);
    --border:#2a2a2a;
}

/* =========================
   BASE
========================= */
body {
    margin:0;
    padding:20px;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* =========================
   TOP
========================= */
#clockBox {
    font-size:54px;
    text-align:center;
    margin-bottom:10px;
}

/* =========================
   LAYOUT
========================= */
.main {
    display:flex;
    gap:20px;
    height:calc(100vh - 120px);
}

/* LEFT = GRID 3x3 */
.left-panel {
    width:320px;
    padding:12px;
    border-radius:14px;
    background:var(--box);
    border:1px solid var(--border);

    display:grid;
    grid-template-columns:repeat(3, 1fr);
    grid-gap:10px;

    align-content:start;
}

/* RIGHT DASHBOARD */
.right-panel {
    flex:1;
}

.wrapper {
    display:flex;
    gap:20px;
}

/* =========================
   GRID BOX (LEFT)
========================= */
.grid-box {
    padding:10px;
    border-radius:10px;
    background:var(--card);
    text-align:center;
    font-size:13px;

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.3),
        0 4px 10px rgba(0,0,0,0.15);
}

/* make select full */
.grid-box select,
.grid-box button {
    width:100%;
    padding:6px;
    font-size:12px;
}

/* status full width */
.status-box {
    grid-column: span 3;
    text-align:center;
    font-size:12px;
}

/* =========================
   RIGHT BOX
========================= */
.box {
    flex:1;
    min-width:480px;
    padding:15px;
    border-radius:14px;
    background:var(--box);
}

/* ROW */
.row {
    display:flex;
    justify-content:space-between;
    padding:6px;
    margin:4px 0;
    background:var(--card);
    border-radius:8px;
}

</style>
</head>

<body>

<div id="clockBox">🕒</div>

<div class="main">

<!-- LEFT 3x3 GRID -->
<div class="left-panel">

<div class="grid-box">
<select id="positionSelect" onchange="updateNames(); validateForm();">
<option value="">ตำแหน่ง</option>
<option>Head</option>
<option>QC-SA</option>
<option>QC-SV</option>
<option>QC-PR</option>
<option>QC-AI</option>
<option>QC-MKT</option>
<option>QC-Support</option>
<option>AD-BO</option>
<option>AD-STM</option>
</select>
</div>

<div class="grid-box">
<select id="nameSelect" onchange="validateForm()">
<option value="">ชื่อ</option>
</select>
</div>

<div class="grid-box">
<button id="startBtn" onclick="startBreak()" disabled>พัก</button>
</div>

<div class="grid-box">
<button id="endBtn" onclick="endBreak()" disabled>กลับ</button>
</div>

<div class="grid-box status-box" id="status">
กรุณาเลือกข้อมูล
</div>

</div>

<!-- RIGHT -->
<div class="right-panel">
<div class="wrapper">

<div class="box">
<h3>⏳ กำลังพัก</h3>
<div id="breakBox"></div>
</div>

<div class="box">
<h3>🧮 เวลาสะสม</h3>
<div id="totalBox"></div>
</div>

</div>
</div>

</div>

<script>

/* DATA */
const data = {
"Head":["จ่าบอส","สปอย","มด ตานอย","ป็อป","เบส","โจโจ้","บอย ท่าพระจันทร์","อร","มอน"],
"QC-SA":["นิด","แนท","แม็ก2","ปู","หนิง","เอ","ใจ๋","ป็อบ","เฟน","เกมส์","ดาว","มะลิ","ปลา","มิน","แอ๊ว","มุ้ย"]
};

let status = {};
let total = {};

/* CLOCK */
setInterval(()=>{
    const n=new Date();
    clockBox.innerText = `🕒 ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
},1000);

/* VALIDATE */
function validateForm(){
    let ok = positionSelect.value && nameSelect.value;
    startBtn.disabled = !ok;
    endBtn.disabled = !ok;
    status.innerText = ok ? "พร้อมใช้งาน" : "กรุณาเลือกข้อมูล";
}

/* UPDATE NAME */
function updateNames(){
    nameSelect.innerHTML="<option value=''>ชื่อ</option>";
    (data[positionSelect.value]||[]).forEach(n=>{
        let o=document.createElement("option");
        o.value=n;
        o.text=n;
        nameSelect.appendChild(o);
    });
}

/* START */
function startBreak(){
    let n=nameSelect.value;
    if(!n) return;
    status[n]=Date.now();
}

/* END */
function endBreak(){
    let n=nameSelect.value;
    if(status[n]){
        let sec=(Date.now()-status[n])/1000;
        total[n]=(total[n]||0)+sec;
        delete status[n];
    }
}

/* FORMAT */
function f(ms){
    let s=Math.floor(ms/1000);
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

/* RENDER */
function render(){
    breakBox.innerHTML="";
    Object.keys(status).forEach(n=>{
        breakBox.innerHTML+=`
        <div class="row">
            <div>${n}</div>
            <div>${f(Date.now()-status[n])}</div>
        </div>`;
    });
}

function renderTotal(){
    totalBox.innerHTML="";
    Object.keys(total).forEach(n=>{
        totalBox.innerHTML+=`
        <div class="row">
            <div>${n}</div>
            <div>${f(total[n]*1000)}</div>
        </div>`;
    });
}

setInterval(()=>{
    render();
    renderTotal();
},1000);

</script>

</body>
</html>
