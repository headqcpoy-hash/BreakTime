<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Break Dashboard</title>

<style>

/* =========================
   🌟 LIGHT (GOLD DEPTH)
========================= */
:root {
    --bg:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.8), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255,215,120,0.3), transparent 40%),
        linear-gradient(135deg, #fff8dc 0%, #f5d27a 50%, #e0b84f 100%);

    --text:#3b2f00;
    --box: linear-gradient(145deg, #ffffff, #f3e2b0);
    --card: linear-gradient(145deg, #fff8d6, #ffd86b);
    --border:#d4af37;
}

/* =========================
   🌑 DARK MODE (DEPTH)
========================= */
body.dark {
    --bg:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.05), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.03), transparent 40%),
        linear-gradient(135deg, #000000 0%, #0a0a0a 40%, #1a1a1a 100%);

    --text:#ffffff;
    --box: linear-gradient(145deg, #0a0a0a, #1a1a1a);
    --card: linear-gradient(145deg, #121212, #1f1f1f);
    --border:#2a2a2a;
}

/* =========================
   BASE
========================= */
body {
    margin:0;
    padding:20px;
    font-family:sans-serif;
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

/* =========================
   TOP BAR
========================= */
#topBar {
    display:flex;
    justify-content:center;
    position:relative;
    margin-bottom:10px;
}

#clockBox {
    font-size:56px;
    padding:10px 20px;
    border-radius:14px;
    text-align:center;

    background:linear-gradient(145deg,#ffffff,#ffe9a3);
    border:2px solid #d4af37;

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.6),
        0 6px 20px rgba(212,175,55,0.3);
}

body.dark #clockBox {
    background:linear-gradient(145deg,#0a0a0a,#1a1a1a);
    border:1px solid #2a2a2a;
}

/* ===== DARK BUTTON ===== */
#themeBtn {
    position:absolute;
    right:10px;
    top:10px;
    width:40px;
    height:40px;
    border-radius:8px;
    border:1px solid var(--border);
    cursor:pointer;
    font-size:18px;
}

/* =========================
   LAYOUT
========================= */
.main {
    display:flex;
    gap:20px;
    height:calc(100vh - 120px);
}

.left-panel {
    width:300px;
}

.right-panel { flex:1; }

.wrapper {
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

/* =========================
   BOX
========================= */
.box, .left-panel {
    padding:15px;
    border-radius:14px;
    background:var(--box);
    border:1px solid var(--border);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.4),
        inset 0 -2px 4px rgba(0,0,0,0.2),
        0 8px 25px rgba(0,0,0,0.2);
}

/* =========================
   TABLE
========================= */
.table-header {
    display:flex;
    font-weight:bold;
    font-size:13px;
    margin-bottom:5px;
}

.table-header div { flex:1; }

.row {
    display:flex;
    padding:6px;
    margin:4px 0;
    border-radius:8px;
    background:var(--card);
}

.row div { flex:1; }

/* =========================
   FORM
========================= */
select, button {
    width:100%;
    padding:10px;
    font-size:16px;
    margin-top:5px;
}

button:disabled {
    opacity:0.4;
    cursor:not-allowed;
}

#status {
    margin-top:10px;
}

/* =========================
   TEXT
========================= */
.pos { color:#b8860b; font-weight:bold; }
body.dark .pos { color:#f5d06f; }

</style>
</head>

<body>

<div id="topBar">
    <div id="clockBox">🕒</div>
    <button id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>

<div class="main">

<!-- LEFT -->
<div class="left-panel">
<h3>☕ ลงเวลา</h3>

<select id="positionSelect" onchange="updateNames(); validateForm();">
<option value="">ตำแหน่ง</option>
<option>Head</option>
<option>QC-SA</option>
<option>QC-SV</option>
<option>QC-PR</option>
<option>QC-AI</option>
<option>QC-MKT</option>
<option>QC-Support</option>
<option>AD-BO</option>
<option>AD-STM</option>
</select>

<select id="nameSelect" onchange="validateForm()">
<option value="">ชื่อ</option>
</select>

<button id="startBtn" onclick="startBreak()" disabled>พัก ☕</button>
<button id="endBtn" onclick="endBreak()" disabled>กลับ 💻</button>

<div id="status">กรุณาเลือกข้อมูล</div>
</div>

<!-- RIGHT -->
<div class="right-panel">
<div class="wrapper">

<div class="box">
<h3>⏳ กำลังพัก</h3>
<div class="table-header">
<div>ตำแหน่ง</div>
<div>ชื่อ</div>
<div>เวลา</div>
</div>
<div id="breakBox"></div>
</div>

<div class="box">
<h3>🧮 เวลาสะสม</h3>
<div class="table-header">
<div>ตำแหน่ง</div>
<div>ชื่อ</div>
<div>เวลา</div>
</div>
<div id="totalBox"></div>
</div>

</div>
</div>

</div>

<script>

/* DATA */
const data = {
"Head":["จ่าบอส","สปอย","มด ตานอย","ป็อป","เบส","โจโจ้","บอย ท่าพระจันทร์","อร","มอน"],
"QC-SA":["นิด","แนท","แม็ก2","ปู","หนิง","เอ","ใจ๋","ป็อบ","เฟน","เกมส์","ดาว","มะลิ","ปลา","มิน","แอ๊ว","มุ้ย"],
"QC-SV":["มาร์ค","คนใหม่ หรือคนเก่า","บอย","โปเต้","เบียร์","ยุ้ย","แบ็ค","เจน"],
"QC-PR":["ฟ้า","พราว","สุ","ลีโอ","มุก","อุ้ย","แอน","แม็ก"],
"QC-AI":["ผ่อง","หนุ่ย","โก๊ะ","อ้อม"],
"QC-MKT":["มด","มอส","เต้ย ก้างปลา 400","ตุ๊กกี้"],
"QC-Support":["เบล","อุ้ม"],
"AD-BO":["ปั้นแป้ง","บอสน้อย","ไอซ์ซี่","กัปตัน","เจนจ้า","ฟ้าครึ้ม","แฟร้ง","บังโด่ง","ฝน","พิมพ์","เจี๊ยบ","ทิพย์ซอ","อุ้ยอ้าย","สนุ๊ก","จารใหม่","นิ"],
"AD-STM":["ต่อ","แตงกวา","เอฟ","ไอซ์2","แอมมี่","เมย์","ต้อ","แหลม","เก๋","ส้ม","ตั๊ก","เฟิร์น"]
};

let status = {};
let total = {};

/* CLOCK */
function clock(){
    const n=new Date();
    const hh=String(n.getHours()).padStart(2,'0');
    const mm=String(n.getMinutes()).padStart(2,'0');
    const ss=String(n.getSeconds()).padStart(2,'0');
    document.getElementById("clockBox").innerHTML = `🕒 ${hh}:${mm}:${ss}`;
}
setInterval(clock,1000);

/* THEME */
function toggleTheme(){
    document.body.classList.toggle("dark");
}

/* VALIDATE */
function validateForm(){
    let p=positionSelect.value;
    let n=nameSelect.value;
    let ok = p && n;

    startBtn.disabled = !ok;
    endBtn.disabled = !ok;

    status.innerText = ok ? "พร้อมใช้งาน" : "กรุณาเลือกตำแหน่ง + ชื่อ";
}

/* UPDATE NAME */
function updateNames(){
    let p=positionSelect.value;
    nameSelect.innerHTML="<option value=''>ชื่อ</option>";

    (data[p]||[]).forEach(n=>{
        let o=document.createElement("option");
        o.value=n;
        o.text=n;
        nameSelect.appendChild(o);
    });
}

/* START / END */
function startBreak(){
    let n=nameSelect.value;
    if(!n) return;
    status[n]=Date.now();
}

function endBreak(){
    let n=nameSelect.value;
    if(!n) return;

    if(status[n]){
        let sec=(Date.now()-status[n])/1000;
        total[n]=(total[n]||0)+sec;
        delete status[n];
    }
}

/* FORMAT */
function f(ms){
    let s=Math.floor(ms/1000);
    let m=String(Math.floor(s/60)).padStart(2,'0');
    let r=String(s%60).padStart(2,'0');
    return `${m}:${r}`;
}

/* POSITION */
function pos(n){
    for(let p in data){
        if(data[p].includes(n)) return p;
    }
    return "-";
}

/* RENDER */
function render(){
    breakBox.innerHTML="";
    Object.keys(status).forEach(n=>{
        breakBox.innerHTML+=`
        <div class="row">
            <div class="pos">${pos(n)}</div>
            <div>${n}</div>
            <div>${f(Date.now()-status[n])}</div>
        </div>`;
    });
}

function renderTotal(){
    totalBox.innerHTML="";
    Object.keys(total).forEach(n=>{
        totalBox.innerHTML+=`
        <div class="row">
            <div class="pos">${pos(n)}</div>
            <div>${n}</div>
            <div>${f(total[n]*1000)}</div>
        </div>`;
    });
}

setInterval(()=>{
    render();
    renderTotal();
},1000);

</script>

</body>
</html>
