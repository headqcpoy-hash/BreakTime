<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบพักเบรค</title>

    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        button { font-size: 20px; padding: 10px 20px; cursor: pointer; }
        #status { font-size: 24px; margin-top: 20px; color: blue; }

        /* popup */
        #teamPopup {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        #teamPopup div {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>ระบบลงเวลาพักเบรค</h1>

    <!-- เลือกชื่อ -->
    <select id="nameSelect">
        <option value="">เลือกชื่อพนักงาน</option>
        <option value="จ่าบอส">จ่าบอส</option>
        <option value="สปอย">สปอย</option>
        <option value="มด ตานอย">มด ตานอย</option>
        <option value="ป็อป">ป็อป</option>
        <option value="เบส">เบส</option>
        <option value="โจโจ้">โจโจ้</option>
        <option value="บอย ท่าพระจันทร์">บอย ท่าพระจันทร์</option>
        <option value="อร">อร</option>
        <option value="มอน">มอน</option>
        <option value="นิด">นิด</option>
        <option value="มาร์ค">มาร์ค</option>
        <option value="แนท">แนท</option>
        <option value="ปู">ปู</option>
        <option value="หนิง">หนิง</option>
        <option value="โปเต้">โปเต้</option>
        <option value="เอ">เอ</option>
        <option value="บอย">บอย</option>
        <option value="ใจ๋">ใจ๋</option>
        <option value="เฟน">เฟน</option>
        <option value="เกมส์">เกมส์</option>
        <option value="ดาว">ดาว</option>
        <option value="มะลิ">มะลิ</option>
        <option value="ยุ้ย">ยุ้ย</option>
        <option value="ปลา">ปลา</option>
        <option value="มิน">มิน</option>
        <option value="แบ็ค">แบ็ค</option>
        <option value="เบียร์">เบียร์</option>
        <option value="เจน">เจน</option>
        <option value="ฟ้า">ฟ้า</option>
        <option value="พราว">พราว</option>
        <option value="สุ">สุ</option>
        <option value="ลีโอ">ลีโอ</option>
        <option value="มุก">มุก</option>
        <option value="อุ้ย">อุ้ย</option>
        <option value="แอน">แอน</option>
        <option value="แม็ก">แม็ก</option>
        <option value="ผ่อง">ผ่อง</option>
        <option value="หนุ่ย">หนุ่ย</option>
        <option value="โก๊ะ">โก๊ะ</option>
        <option value="อ้อม">อ้อม</option>
        <option value="มด">มด</option>
        <option value="มอส">มอส</option>
        <option value="ตุ๊กกี้">ตุ๊กกี้</option>
        <option value="เบล">เบล</option>
        <option value="อุ้ม">อุ้ม</option>
        <option value="บอสน้อย">บอสน้อย</option>
        <option value="กัปตัน">กัปตัน</option>
        <option value="ฝน">ฝน</option>
        <option value="เมย์">เมย์</option>
        <option value="เฟิร์น">เฟิร์น</option>
    </select>

    <br><br>

    <!-- ปุ่มทีม -->
    <button onclick="openPopup()">เลือกทีม</button>

    <br><br>

    <!-- ปุ่มทำงาน -->
    <button onclick="takeBreak()">พักเบรค</button>
    <button onclick="backToWork()">กลับมา</button>

    <div id="status">สถานะ: -</div>

    <!-- POPUP เลือกทีม -->
    <div id="teamPopup">
        <div>
            <h2>เลือกทีม</h2>

            <select id="teamSelect">
                <option value="">-- เลือกทีม --</option>
                <option value="Head">Head</option>
                <option value="AD-BO">AD-BO</option>
                <option value="AD-STM">AD-STM</option>
                <option value="QC-SA">QC-SA</option>
                <option value="QC-PR">QC-PR</option>
                <option value="QC-SV">QC-SV</option>
                <option value="QC-AI">QC-AI</option>
                <option value="QC-MKT">QC-MKT</option>
                <option value="QC-Support">QC-Support</option>
            </select>

            <br><br>

            <button onclick="confirmTeam()">ยืนยัน</button>
            <button onclick="closePopup()">ปิด</button>
        </div>
    </div>

<script>
let selectedTeam = "";

function openPopup() {
    document.getElementById('teamPopup').style.display = 'flex';
}

function closePopup() {
    document.getElementById('teamPopup').style.display = 'none';
}

function confirmTeam() {
    const team = document.getElementById('teamSelect').value;
    if (!team) return alert("กรุณาเลือกทีม");

    selectedTeam = team;
    closePopup();

    document.getElementById('status').innerText = `เลือกทีม: ${selectedTeam}`;
}

function takeBreak() {
    const name = document.getElementById('nameSelect').value;
    if (!name) return alert("กรุณาเลือกชื่อ");
    if (!selectedTeam) return alert("กรุณาเลือกทีม");

    document.getElementById('status').innerText =
        `${name} (${selectedTeam}) พักเบรค ☕`;
}

function backToWork() {
    const name = document.getElementById('nameSelect').value;
    if (!name) return alert("กรุณาเลือกชื่อ");
    if (!selectedTeam) return alert("กรุณาเลือกทีม");

    document.getElementById('status').innerText =
        `${name} (${selectedTeam}) กลับมาทำงาน 💻`;
}
</script>

</body>
</html>
