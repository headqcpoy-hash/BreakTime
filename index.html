<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Break Dashboard</title>

<style>
:root {
    --bg:
        radial-gradient(circle at 20% 20%, rgba(140,0,255,0.25), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(0,180,255,0.25), transparent 40%),
        linear-gradient(135deg, #070014 0%, #0b0033 40%, #050018 100%);
    --text:#e8e6ff;
    --box: linear-gradient(145deg, rgba(30,0,60,0.8), rgba(10,0,30,0.9));
    --card: linear-gradient(145deg, rgba(120,0,255,0.15), rgba(0,180,255,0.10));
    --border: rgba(160,80,255,0.5);
}

body {
    margin:0;
    padding:20px;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
}

#clockBox {
    font-size:56px;
    text-align:center;
    margin-bottom:10px;
}

.main { display:flex; gap:20px; height:calc(100vh - 100px); }
.left-panel { width:300px; }
.right-panel { flex:1; }

.wrapper { display:flex; gap:20px; }

.box {
    flex:1;
    min-width:450px;
    padding:15px;
    border-radius:14px;
    background:var(--box);
    border:1px solid var(--border);
}

.header, .row { display:flex; padding:8px; }

.header {
    font-weight:bold;
    border-bottom:1px solid var(--border);
}

.header div, .row div { flex:1; }

.row {
    margin:5px 0;
    border-radius:10px;
    background:var(--card);
}

select, button {
    width:100%;
    padding:10px;
    margin-top:5px;
    background:rgba(0,0,0,0.3);
    color:white;
    border:1px solid var(--border);
}

button:disabled { opacity:0.3; }

#status { margin-top:10px; }
</style>
</head>

<body>

<div id="clockBox">🕒</div>

<div class="main">
    <div class="left-panel">
        <h3>☕ CONTROL</h3>

        <select id="positionSelect">
            <option value="">ตำแหน่ง</option>
            <option>Head</option>
            <option>QC-SA</option>
            <option>QC-SV</option>
            <option>QC-PR</option>
            <option>QC-AI</option>
            <option>QC-MKT</option>
            <option>QC-Support</option>
            <option>AD-BO</option>
            <option>AD-STM</option>
        </select>

        <select id="nameSelect">
            <option value="">ชื่อ</option>
        </select>

        <select id="typeSelect">
            <option value="">ประเภทธุระ</option>
            <option>พักกินข้าว</option>
            <option>เข้าห้องน้ำ</option>
            <option>สูบบุหรี่</option>
            <option>เอาของ(ส่วนรวม)</option>
        </select>

        <button id="startBtn">START</button>
        <button id="endBtn">END</button>

        <div id="status">SYSTEM READY</div>
    </div>

    <div class="right-panel">
        <div class="wrapper">

            <div class="box">
                <h3>⏳ ACTIVE BREAK</h3>
                <div class="header">
                    <div>POSITION</div>
                    <div>NAME</div>
                    <div>TYPE</div>
                    <div>TIME</div>
                </div>
                <div id="breakBox"></div>
            </div>

            <div class="box">
                <h3>🧮 TOTAL TIME</h3>
                <div class="header">
                    <div>POSITION</div>
                    <div>NAME</div>
                    <div>TYPE</div>
                    <div>TIME</div>
                </div>
                <div id="totalBox"></div>
            </div>

        </div>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/a/macros/log-horizon2.com/s/AKfycbxrhUSmBHE-tb-q1hxb4aqEvgmND1Re9BtBXOLtwucfUI-sfLDvQ4nasETWQ_dqIpy51g/exec";

const data = {
    "Head":["จ่าบอส","สปอย","มด ตานอย","ป็อป","เบส","โจโจ้","บอย ท่าพระจันทร์","อร","มอน"],
    "QC-SA":["นิด","แนท","แม็ก2","ปู","หนิง","เอ","ใจ๋","ป็อบ","เฟน","เกมส์","ดาว","มะลิ","ปลา","มิน","แอ๊ว","มุ้ย"],
    "QC-SV":["มาร์ค","บอย","โปเต้","เบียร์","ยุ้ย","แบ็ค","เจน"],
    "QC-PR":["ฟ้า","พราว","สุ","ลีโอ","มุก","อุ้ย","แอน","แม็ก"],
    "QC-AI":["ผ่อง","หนุ่ย","โก๊ะ","อ้อม"],
    "QC-MKT":["มด","มอส","เต้ย","ตุ๊กกี้"],
    "QC-Support":["เบล","อุ้ม"],
    "AD-BO":["ปั้นแป้ง","บอสน้อย","ไอซ์ซี่","กัปตัน"],
    "AD-STM":["ต่อ","แตงกวา","เอฟ","ไอซ์2"]
};

let active = {};
let total = {};

/* CLOCK */
setInterval(()=>{
    const n = new Date();
    document.getElementById("clockBox").innerText =
    `🕒 ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}:${n.getSeconds().toString().padStart(2,'0')}`;
},1000);

/* NAME */
document.getElementById("positionSelect").addEventListener("change", function(){
    const nameSelect = document.getElementById("nameSelect");
    nameSelect.innerHTML = "<option value=''>ชื่อ</option>";

    (data[this.value] || []).forEach(n=>{
        let o = document.createElement("option");
        o.value = n;
        o.text = n;
        nameSelect.appendChild(o);
    });
});

/* KEY */
function key(){
    return document.getElementById("nameSelect").value +
    "||" +
    document.getElementById("typeSelect").value;
}

/* START */
document.getElementById("startBtn").onclick = function(){
    const name = document.getElementById("nameSelect").value;
    const pos = document.getElementById("positionSelect").value;
    const type = document.getElementById("typeSelect").value;

    if(!name || !pos || !type) return;

    const k = key();

    active[k] = { name, pos, type, start: Date.now() };

    fetch(API_URL,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            name, position:pos, type,
            action:"START",
            duration:0
        })
    })
    .then(r=>r.text())
    .then(r=>console.log(r));
};

/* END */
document.getElementById("endBtn").onclick = function(){
    const name = document.getElementById("nameSelect").value;
    const pos = document.getElementById("positionSelect").value;
    const type = document.getElementById("typeSelect").value;

    const k = key();
    if(!active[k]) return;

    const sec = (Date.now() - active[k].start)/1000;
    total[k] = (total[k]||0) + sec;

    fetch(API_URL,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            name, position:pos, type,
            action:"END",
            duration:sec
        })
    });

    delete active[k];
};

/* REALTIME */
async function fetchLive(){
    try{
        const res = await fetch(API_URL);
        const data = await res.json();

        document.getElementById("breakBox").innerHTML = "";
        document.getElementById("totalBox").innerHTML = "";

        data.slice(1).forEach(r=>{
            let [t,n,p,ty,a,d] = r;

            if(a==="START"){
                document.getElementById("breakBox").innerHTML +=
                `<div class="row"><div>${p}</div><div>${n}</div><div>${ty}</div><div>LIVE</div></div>`;
            }

            if(a==="END"){
                document.getElementById("totalBox").innerHTML +=
                `<div class="row"><div>${p}</div><div>${n}</div><div>${ty}</div><div>${Math.floor(d/60)}:${Math.floor(d%60)}</div></div>`;
            }
        });

    } catch(e){
        console.log(e);
    }
}

setInterval(fetchLive,2000);
</script>

</body>
</html>
