<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Break Dashboard</title>

<style>

/* 🌈 THEME */
:root {
    --bg: #ffffff;
    --text: #000;
    --box: #ffffff;
    --border: #ccc;
    --card: #ffe6a7;
}

body.dark {
    --bg: #121212;
    --text: #ffffff;
    --box: #1e1e1e;
    --border: #444;
    --card: #333;
}

body {
    font-family: sans-serif;
    margin: 0;
    padding: 15px;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

/* 🕒 TOP BAR */
#topBar {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 10px;
}

/* CLOCK */
#clockBox {
    font-size: 44px;
    font-weight: bold;
    padding: 12px 25px;
    border: 3px solid var(--border);
    border-radius: 12px;
}

/* 🌗 BUTTON (มุมขวาบน เล็ก) */
#themeBtn {
    position: absolute;
    right: 10px;
    top: 10px;

    font-size: 11px;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    opacity: 0.7;
    border: 1px solid var(--border);
    background: var(--box);
    color: var(--text);
}

#themeBtn:hover {
    opacity: 1;
}

/* MAIN */
.main {
    display: flex;
    gap: 15px;
}

/* LEFT */
.left-panel {
    width: 230px;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    background: var(--box);
}

/* RIGHT */
.right-panel {
    flex: 1;
}

/* BOXES */
.wrapper {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.box {
    flex: 1;
    min-width: 320px;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    background: var(--box);
}

/* CARD */
.card {
    background: var(--card);
    margin: 6px;
    padding: 8px;
    border-radius: 8px;
    font-size: 14px;
}

/* INPUT */
select, button {
    width: 100%;
    font-size: 14px;
    padding: 5px;
    margin-top: 5px;
}

#status {
    font-size: 14px;
    color: #4a90e2;
    margin-top: 10px;
}

</style>
</head>

<body>

<!-- 🕒 TOP BAR -->
<div id="topBar">
    <div id="clockBox">🕒 00:00:00</div>
    <button id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>

<div class="main">

    <!-- LEFT -->
    <div class="left-panel">

        <h4>☕ Control</h4>

        <select id="positionSelect" onchange="updateNames()">
            <option value="">ตำแหน่ง</option>
            <option value="Head">Head</option>
            <option value="QC-SA">QC-SA</option>
            <option value="QC-SV">QC-SV</option>
            <option value="QC-PR">QC-PR</option>
            <option value="QC-AI">QC-AI</option>
            <option value="QC-MKT">QC-MKT</option>
            <option value="QC-Support">QC-Support</option>
            <option value="AD-BO">AD-BO</option>
            <option value="AD-STM">AD-STM</option>
        </select>

        <select id="nameSelect">
            <option value="">ชื่อ</option>
        </select>

        <button onclick="startBreak()">พัก ☕</button>
        <button onclick="endBreak()">กลับ 💻</button>

        <div id="status">สถานะ: -</div>

    </div>

    <!-- RIGHT -->
    <div class="right-panel">

        <div class="wrapper">

            <div class="box">
                <h3>⏳ กำลังพัก</h3>
                <div id="breakBox"></div>
            </div>

            <div class="box">
                <h3>🧮 เวลาสะสม</h3>
                <div id="totalBox"></div>
            </div>

        </div>

    </div>

</div>

<script>

/* DATA */
const data = {
"Head": ["จ่าบอส","สปอย","มด ตานอย","ป็อป","เบส","โจโจ้","บอย ท่าพระจันทร์","อร","มอน"],
"QC-SA": ["นิด","แนท","แม็ก2","ปู","หนิง","เอ","ใจ๋","ป็อบ","เฟน","เกมส์","ดาว","มะลิ","ปลา","มิน","แอ๊ว","มุ้ย"],
"QC-SV": ["มาร์ค","คนใหม่ หรือคนเก่า","บอย","โปเต้","เบียร์","ยุ้ย","แบ็ค","เจน"],
"QC-PR": ["ฟ้า","พราว","สุ","ลีโอ","มุก","อุ้ย","แอน","แม็ก"],
"QC-AI": ["ผ่อง","หนุ่ย","โก๊ะ","อ้อม"],
"QC-MKT": ["มด","มอส","เต้ย ก้างปลา 400","ตุ๊กกี้"],
"QC-Support": ["เบล","อุ้ม"],
"AD-BO": ["ปั้นแป้ง","บอสน้อย","ไอซ์ซี่ 789","กัปตัน","เจนจ้า","ฟ้าครึ้ม","แฟร้ง","บังโด่ง 786","ฝน","พิมพ์","เจี๊ยบ","ทิพย์ซอ","อุ้ยอ้าย","สนุ๊ก","จารใหม่ 168","นิ"],
"AD-STM": ["ต่อ","แตงกวา","เอฟ","ไอซ์2","แอมมี่","เมย์","ต้อ","แหลม","เก๋","ส้ม","ตั๊ก","เฟิร์น"]
};

let status = {};
let totalBreak = {};

/* 🌗 LOAD THEME */
function loadTheme() {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        document.getElementById("themeBtn").innerText = "☀️";
    }
}
loadTheme();

/* 🌗 TOGGLE */
function toggleTheme() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme","dark");
        document.getElementById("themeBtn").innerText = "☀️";
    } else {
        localStorage.setItem("theme","light");
        document.getElementById("themeBtn").innerText = "🌙";
    }
}

/* 🕒 CLOCK */
function updateClock() {
    const now = new Date();

    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');

    const d = String(now.getDate()).padStart(2,'0');
    const mo = String(now.getMonth()+1).padStart(2,'0');
    const y = now.getFullYear();

    const days = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"];

    document.getElementById("clockBox").innerText =
        `🕒 ${h}:${m}:${s} | 📅 ${d}/${mo}/${y} (${days[now.getDay()]})`;
}

setInterval(updateClock, 1000);
updateClock();

/* NAME */
function updateNames() {
    const pos = document.getElementById("positionSelect").value;
    const select = document.getElementById("nameSelect");

    select.innerHTML = '<option value="">ชื่อ</option>';

    if (!data[pos]) return;

    data[pos].forEach(name => {
        let opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
    });
}

/* BREAK */
function startBreak() {
    const name = document.getElementById("nameSelect").value;
    if (!name) return alert("เลือกชื่อ");

    status[name] = Date.now();
    document.getElementById("status").innerText = name + " เริ่มพัก";
    render();
}

function endBreak() {
    const name = document.getElementById("nameSelect").value;
    if (!name) return alert("เลือกชื่อ");

    if (status[name]) {
        const min = Math.floor((Date.now() - status[name]) / 60000);
        totalBreak[name] = (totalBreak[name] || 0) + min;
        delete status[name];
    }

    document.getElementById("status").innerText = name + " กลับแล้ว";
    render();
    renderTotal();
}

/* LIVE */
function getMin(t) {
    return Math.floor((Date.now() - t) / 60000);
}

function render() {
    const box = document.getElementById("breakBox");
    box.innerHTML = "";

    Object.keys(status).forEach(name => {
        box.innerHTML += `
            <div class="card">
                <b>${name}</b><br>
                ⏳ ${getMin(status[name])} นาที
            </div>
        `;
    });
}

function renderTotal() {
    const box = document.getElementById("totalBox");
    box.innerHTML = "";

    Object.keys(totalBreak).forEach(name => {
        box.innerHTML += `
            <div class="card">
                <b>${name}</b><br>
                🧮 ${totalBreak[name]} นาที
            </div>
        `;
    });
}

setInterval(() => {
    render();
    renderTotal();
}, 3000);

</script>

</body>
</html>
