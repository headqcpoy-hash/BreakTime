<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Break Dashboard</title>

<style>
:root {
    --bg: #0a0a0a;           /* พื้นหลังดำสนิท */
    --text: #e5e5e5;         /* ตัวอักษรขาวนวล */
    --box: #161616;          /* พื้นหลังกล่อง/การ์ด */
    --border: #3d3422;       /* สีเส้นขอบทองหม่น */
    --gold: #c5a059;         /* สีทองหลัก */
    --gold-bright: #f3e092;  /* สีทองสว่างสำหรับเล่นแสง */
    
    /* การไล่ระดับสีแบบโลหะ (Metallic Gradient) */
    --gold-gradient: linear-gradient(135deg, #a67c00 0%, #bf953f 25%, #fcf6ba 50%, #b38728 75%, #aa771c 100%);
    
    /* เงาสีทองฟุ้งๆ */
    --gold-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 8px rgba(197, 160, 89, 0.1);
}

/* 2. การตั้งค่าพื้นฐานเพื่อให้เว็บดูแพง */
body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif; /* แนะนำใช้ฟอนต์ดูสะอาดตา */
    line-height: 1.6;
    margin: 0;
    padding: 20px;
}

/* 3. ตัวอย่างการใช้กับการ์ด (Luxury Card) */
.card {
    background-color: var(--box);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    max-width: 400px;
    box-shadow: var(--gold-shadow);
    transition: transform 0.3s ease, border-color 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
    border-color: var(--gold); /* ขอบสว่างขึ้นเมื่อชี้ */
}

/* 4. หัวข้อสีทองเหลือบ (Golden Text Gradient) */
h1, .gold-text {
    background: var(--gold-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: inline-block;
    font-weight: bold;
    font-size: 2rem;
    margin-bottom: 1rem;
}

/* 5. ปุ่มทองหรู */
.btn-gold {
    background: var(--gold-gradient);
    color: #000;
    border: none;
    padding: 12px 24px;
    border-radius: 6px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.3s;
}

.btn-gold:hover {
    opacity: 0.9;
    box-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
</style>
</head>

<body>

<div id="topBar">
    <div id="clockBox">🕒</div>
    <button id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>

<div class="main">

<!-- LEFT -->
<div class="left-panel">

<h4>☕ ลงเวลา</h4>

<select id="positionSelect" onchange="updateNames()">
    <option value="">ตำแหน่ง</option>
    <option>Head</option>
    <option>QC-SA</option>
    <option>QC-SV</option>
    <option>QC-PR</option>
    <option>QC-AI</option>
    <option>QC-MKT</option>
    <option>QC-Support</option>
    <option>AD-BO</option>
    <option>AD-STM</option>
</select>

<select id="nameSelect">
    <option>ชื่อ</option>
</select>

<button onclick="startBreak()">พัก ☕</button>
<button onclick="endBreak()">กลับ 💻</button>

<div id="status">-</div>

</div>

<!-- RIGHT -->
<div class="right-panel">

<div class="wrapper">

<div class="box">
    <h3>⏳ กำลังพัก</h3>
    <div class="table-header">
        <div>ตำแหน่ง</div>
        <div>ชื่อ</div>
        <div>ระยะเวลา</div>
    </div>
    <div id="breakBox"></div>
</div>

<div class="box">
    <h3>🧮 เวลาสะสม</h3>
    <div class="table-header">
        <div>ตำแหน่ง</div>
        <div>ชื่อ</div>
        <div>ระยะเวลา</div>
    </div>
    <div id="totalBox"></div>
</div>

</div>
</div>
</div>

<script>

/* DATA */
const data = {
"Head":["จ่าบอส","สปอย","มด ตานอย","ป็อป","เบส","โจโจ้","บอย ท่าพระจันทร์","อร","มอน"],
"QC-SA":["นิด","แนท","แม็ก2","ปู","หนิง","เอ","ใจ๋","ป็อบ","เฟน","เกมส์","ดาว","มะลิ","ปลา","มิน","แอ๊ว","มุ้ย"],
"QC-SV":["มาร์ค","คนใหม่ หรือคนเก่า","บอย","โปเต้","เบียร์","ยุ้ย","แบ็ค","เจน"],
"QC-PR":["ฟ้า","พราว","สุ","ลีโอ","มุก","อุ้ย","แอน","แม็ก"],
"QC-AI":["ผ่อง","หนุ่ย","โก๊ะ","อ้อม"],
"QC-MKT":["มด","มอส","เต้ย ก้างปลา 400","ตุ๊กกี้"],
"QC-Support":["เบล","อุ้ม"],
"AD-BO":["ปั้นแป้ง","บอสน้อย","ไอซ์ซี่","กัปตัน","เจนจ้า","ฟ้าครึ้ม","แฟร้ง","บังโด่ง","ฝน","พิมพ์","เจี๊ยบ","ทิพย์ซอ","อุ้ยอ้าย","สนุ๊ก","จารใหม่","นิ"],
"AD-STM":["ต่อ","แตงกวา","เอฟ","ไอซ์2","แอมมี่","เมย์","ต้อ","แหลม","เก๋","ส้ม","ตั๊ก","เฟิร์น"]
};

let status = {};
let total = {};

/* CLOCK */
function clock(){
    const n=new Date();
    const d=String(n.getDate()).padStart(2,'0');
    const m=String(n.getMonth()+1).padStart(2,'0');
    const y=n.getFullYear();
    const hh=String(n.getHours()).padStart(2,'0');
    const mm=String(n.getMinutes()).padStart(2,'0');
    const ss=String(n.getSeconds()).padStart(2,'0');
    const day=["อา","จ","อ","พ","พฤ","ศ","ส"];

    document.getElementById("clockBox").innerHTML =
    `🕒 ${hh}:${mm}:${ss}<br>📅 ${d}/${m}/${y} (${day[n.getDay()]})`;
}
setInterval(clock,1000);
clock();

/* THEME */
function toggleTheme(){
    document.body.classList.toggle("dark");
}

/* NAME */
function updateNames(){
    let p=document.getElementById("positionSelect").value;
    let s=document.getElementById("nameSelect");

    s.innerHTML="<option>ชื่อ</option>";

    (data[p]||[]).forEach(n=>{
        let o=document.createElement("option");
        o.text=n;
        o.value=n;
        s.appendChild(o);
    });
}

/* START */
function startBreak(){
    let n=document.getElementById("nameSelect").value;
    if(!n) return alert("เลือกชื่อ");
    status[n]=Date.now();
}

/* END */
function endBreak(){
    let n=document.getElementById("nameSelect").value;
    if(!n) return;

    if(status[n]){
        let sec=(Date.now()-status[n])/1000;
        total[n]=(total[n]||0)+sec;
        delete status[n];
    }
}

/* FORMAT */
function f(ms){
    let s=Math.floor(ms/1000);
    let m=String(Math.floor(s/60)).padStart(2,'0');
    let r=String(s%60).padStart(2,'0');
    return `${m}:${r}`;
}

/* POSITION */
function pos(n){
    for(let p in data){
        if(data[p].includes(n)) return p;
    }
    return "-";
}

/* RENDER BREAK */
function render(){
    let b=document.getElementById("breakBox");
    b.innerHTML="";

    Object.keys(status).forEach(n=>{
        b.innerHTML+=`
        <div class="card row">
            <div class="col pos">${pos(n)}</div>
            <div class="col name">${n}</div>
            <div class="col time">${f(Date.now()-status[n])}</div>
        </div>`;
    });
}

/* RENDER TOTAL */
function renderTotal(){
    let b=document.getElementById("totalBox");
    b.innerHTML="";

    Object.keys(total).forEach(n=>{
        b.innerHTML+=`
        <div class="card row">
            <div class="col pos">${pos(n)}</div>
            <div class="col name">${n}</div>
            <div class="col time">${f(total[n]*1000)}</div>
        </div>`;
    });
}

/* LOOP */
setInterval(()=>{
    render();
    renderTotal();
},1000);

</script>

</body>
</html>
