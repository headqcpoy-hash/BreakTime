<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Break Dashboard</title>

<style>

/* =========================
   THEME
========================= */
:root {
    --bg:#f5f5f5;
    --text:#000;
    --box:#ffffff;
    --card:#ffffff;
    --border:#ddd;
}

body.dark {
    --bg:#0f0f0f;
    --text:#fff;
    --box:#1a1a1a;
    --card:#222;
    --border:#333;
}

/* =========================
   BASE
========================= */
body {
    margin:0;
    padding:20px;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* =========================
   CLOCK
========================= */
#clockBox {
    font-size:54px;
    text-align:center;
    margin-bottom:10px;
}

/* =========================
   LAYOUT
========================= */
.main {
    display:flex;
    gap:20px;
    height:calc(100vh - 100px);
}

.left-panel {
    width:300px;
}

.right-panel {
    flex:1;
}

/* =========================
   DASHBOARD SIDE BY SIDE
========================= */
.wrapper {
    display:flex;
    gap:20px;
    height:100%;
}

/* =========================
   BOX
========================= */
.box {
    flex:1;
    padding:15px;
    border-radius:12px;
    background:var(--box);
    border:1px solid var(--border);
    display:flex;
    flex-direction:column;
}

/* =========================
   TITLE
========================= */
h3 {
    margin:0 0 10px 0;
}

/* =========================
   HEADER 3 COLUMNS
========================= */
.header {
    display:flex;
    font-weight:bold;
    padding:8px;
    border-bottom:2px solid var(--border);
    margin-bottom:8px;
}

.header div {
    flex:1;
}

/* =========================
   ROW 3 COLUMNS
========================= */
.row {
    display:flex;
    padding:8px;
    margin:4px 0;
    background:var(--card);
    border-radius:8px;
}

.row div {
    flex:1;
}

/* =========================
   FORM
========================= */
select, button {
    width:100%;
    padding:10px;
    margin-top:5px;
}

button:disabled {
    opacity:0.4;
}

/* =========================
   LEFT PANEL
========================= */
.left-panel {
    width:300px;
}

</style>
</head>

<body>

<div id="clockBox">🕒</div>

<div class="main">

<!-- LEFT -->
<div class="left-panel">

<h3>☕ ลงเวลา</h3>

<select id="positionSelect" onchange="updateNames(); validateForm();">
<option value="">ตำแหน่ง</option>
<option>Head</option>
<option>QC-SA</option>
<option>QC-SV</option>
<option>QC-PR</option>
<option>QC-AI</option>
<option>QC-MKT</option>
<option>QC-Support</option>
<option>AD-BO</option>
<option>AD-STM</option>
</select>

<select id="nameSelect" onchange="validateForm()">
<option value="">ชื่อ</option>
</select>

<button id="startBtn" onclick="startBreak()" disabled>พัก ☕</button>
<button id="endBtn" onclick="endBreak()" disabled>กลับ 💻</button>

<div id="status">กรุณาเลือกข้อมูล</div>

</div>

<!-- RIGHT -->
<div class="right-panel">
<div class="wrapper">

<!-- ⏳ LEFT DASHBOARD -->
<div class="box">
<h3>⏳ กำลังพัก</h3>

<div class="header">
<div>ตำแหน่ง</div>
<div>ชื่อ</div>
<div>เวลา</div>
</div>

<div id="breakBox"></div>
</div>

<!-- 🧮 RIGHT DASHBOARD -->
<div class="box">
<h3>🧮 เวลาสะสม</h3>

<div class="header">
<div>ตำแหน่ง</div>
<div>ชื่อ</div>
<div>เวลา</div>
</div>

<div id="totalBox"></div>
</div>

</div>
</div>

</div>

<script>

/* DATA */
const data = {
"Head":["จ่าบอส","สปอย","มด ตานอย","ป็อป","เบส"],
"QC-SA":["นิด","แนท","แม็ก2","ปู","หนิง"],
"QC-SV":["มาร์ค","บอย","โปเต้"],
"QC-PR":["ฟ้า","พราว","สุ"],
"QC-AI":["ผ่อง","หนุ่ย"],
"QC-MKT":["มด","มอส"],
"QC-Support":["เบล"],
"AD-BO":["ปั้นแป้ง","บอสน้อย"],
"AD-STM":["ต่อ","แตงกวา"]
};

let status = {};
let total = {};

/* CLOCK */
setInterval(()=>{
    const n=new Date();
    clockBox.innerText =
    `🕒 ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
},1000);

/* VALIDATE */
function validateForm(){
    let ok = positionSelect.value && nameSelect.value;
    startBtn.disabled = !ok;
    endBtn.disabled = !ok;
    status.innerText = ok ? "พร้อมใช้งาน" : "กรุณาเลือกตำแหน่ง + ชื่อ";
}

/* NAME */
function updateNames(){
    nameSelect.innerHTML="<option value=''>ชื่อ</option>";
    (data[positionSelect.value]||[]).forEach(n=>{
        let o=document.createElement("option");
        o.value=n;
        o.text=n;
        nameSelect.appendChild(o);
    });
}

/* START / END */
function startBreak(){
    let n=nameSelect.value;
    if(!n) return;
    status[n]=Date.now();
}

function endBreak(){
    let n=nameSelect.value;
    if(status[n]){
        let sec=(Date.now()-status[n])/1000;
        total[n]=(total[n]||0)+sec;
        delete status[n];
    }
}

/* FORMAT */
function f(ms){
    let s=Math.floor(ms/1000);
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

/* POSITION */
function pos(n){
    for(let p in data){
        if(data[p].includes(n)) return p;
    }
    return "-";
}

/* RENDER BREAK */
function render(){
    breakBox.innerHTML="";
    Object.keys(status).forEach(n=>{
        breakBox.innerHTML+=`
        <div class="row">
            <div>${pos(n)}</div>
            <div>${n}</div>
            <div>${f(Date.now()-status[n])}</div>
        </div>`;
    });
}

/* RENDER TOTAL */
function renderTotal(){
    totalBox.innerHTML="";
    Object.keys(total).forEach(n=>{
        totalBox.innerHTML+=`
        <div class="row">
            <div>${pos(n)}</div>
            <div>${n}</div>
            <div>${f(total[n]*1000)}</div>
        </div>`;
    });
}

setInterval(()=>{
    render();
    renderTotal();
},1000);

</script>

</body>
</html>
